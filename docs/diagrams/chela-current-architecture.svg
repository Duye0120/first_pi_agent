  <path d="M1300 551H1392" stroke="#F7C66B" stroke-width="3" marker-end="url(#arrowWarn)"/>
  <path d="M1112 546H1136" stroke="#84E1BC" stroke-width="3" marker-end="url(#arrowSoft)"/>
