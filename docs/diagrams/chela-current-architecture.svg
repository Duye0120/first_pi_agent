  <path d="M1112 548C1172 734 1328 738 1392 739" stroke="#F7C66B" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrowWarn)"/>

  <text x="522" y="198" class="small">React / TSX</text>
  <text x="786" y="382" class="small">desktopApi</text>
  <text x="1420" y="468" class="small">packy / OpenAI-compatible / MCP servers</text>
